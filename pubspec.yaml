name: trading_ios
description: Multi-market trading app for iOS - stocks, crypto, forex
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Charts
  fl_chart: ^0.68.0
  candlesticks: ^2.1.0

  # Networking
  dio: ^5.4.0

  # Local storage
  shared_preferences: ^2.2.2

  # Utilities
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
